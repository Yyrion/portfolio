<section id="skills" class="section section-gray">
  <div class="container">
    <h2>Mes Compétences</h2>
    <div class="skills-lines" aria-label="Catégories de compétences avec défilement horizontal">
      @for (category of skillsCategories; track category.title) {
        <article class="skill-line">
          <h3>{{ category.title }}</h3>

          <div class="skills-container" role="list" aria-label="Compétences: {{ category.title }}">
            @for (skill of category.skills; track skill) {
              <span class="skill" role="listitem">
                @if (getIconPath(skill)) {
                  <img class="skill-icon" src="{{ getIconPath(skill) }}" alt="{{ skill }} logo" />
                }
                <span class="skill-label">{{ skill }}</span>
              </span>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
